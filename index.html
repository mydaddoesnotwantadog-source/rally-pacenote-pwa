<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA Setup -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>RALLY//NODE</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet & Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        
        <!-- SETUP SCREEN -->
        <section id="setup-screen" class="screen active">
            <header class="rigid-header">
                <div class="brand">
                    <h1>RALLY<span class="accent">//</span>NODE</h1>
                    <div class="system-status">
                        <div class="dot online" id="network-dot"></div>
                        <span id="network-text">SYS.ONLINE</span>
                    </div>
                </div>
                <div class="unit-toggle" id="unit-toggle">
                    <span id="unit-km" class="active">KM</span>
                    <span class="divider">|</span>
                    <span id="unit-mi">MI</span>
                </div>
            </header>

            <div class="map-container">
                <div id="map"></div>
                <div class="map-overlay">
                    <p id="upload-status" class="status-text">AWAITING ROUTE INPUT...</p>
                    <button id="clear-route-btn" class="minimal-btn">CLR</button>
                </div>
            </div>

            <!-- DRIVE STATS ENGINE -->
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-label">DIST</span>
                    <span class="stat-value" id="stat-dist">--</span>
                    <span class="stat-unit">KM</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">TURNS</span>
                    <span class="stat-value" id="stat-turns">--</span>
                    <span class="stat-unit">TOTAL</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">AVG.T</span>
                    <span class="stat-value" id="stat-avg">--</span>
                    <span class="stat-unit">NOTE</span>
                </div>
                <div class="stat-box accent-box">
                    <span class="stat-label">HAIRPIN</span>
                    <span class="stat-value" id="stat-hairpins">0</span>
                    <span class="stat-unit">WRN</span>
                </div>
            </div>

            <button id="start-drive-btn" class="primary-btn" disabled>INITIATE DRIVE</button>
        </section>

        <!-- DRIVE SCREEN -->
        <section id="drive-screen" class="screen">
            <div class="top-bar">
                <div class="speed-box">
                    <span class="speed-value" id="current-speed">0</span>
                    <span class="speed-unit">MPH</span>
                </div>
                <button id="stop-drive-btn" class="danger-btn">ABORT</button>
            </div>

            <div class="pacenote-display">
                <h2 class="distance-value" id="distance-to-turn">---</h2>
                <span class="distance-unit">METERS TO</span>
                <div class="turn-callout" id="current-callout">STANDBY</div>
            </div>

            <div class="upcoming-notes">
                <p>NXT <span class="accent">//</span> <span id="next-callout">---</span></p>
            </div>
        </section>

    </main>

    <!-- Leaflet & Routing JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
